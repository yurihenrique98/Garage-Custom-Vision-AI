name: gcv_mobile_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # API & Image Handling
  http: ^1.2.1
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  
  # UI & Utilities
  screenshot: ^3.0.0
  flutter_colorpicker: ^1.1.0
  share_plus: ^10.1.4
  path_provider: ^2.1.3
  url_launcher: ^6.3.1

  # FIREBASE 
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/GCV_Garage.png